<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Links | Hub Brain System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile">
        <div class="avatar-container">
            <div class="avatar-frame"></div>
            <img src="URL_PARA_TUA_FOTO" alt="DITOH Profile" class="avatar" id="profilePic">
        </div>
        <h1 class="profile-title">NEURAL LINKS</h1>
        <p class="profile-subtitle">HUB BRAIN SYSTEM OPERATOR</p>
    </div>

    <div id="links-list" class="links-container">
        <p style="text-align: center; color: #555; font-size: 0.8rem; letter-spacing: 1px;">Sincronizando Rede Neural [STATUS: ACESSANDO FIREBASE...]</p>
    </div>

    <footer class="footer">
        STATUS: ONLINE | <span class="dev-signature">Found Dev DITOH</span>
        <a href="admin.html" class="admin-link">ACC_CORE</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
            authDomain: "neural-links.firebaseapp.com",
            projectId: "neural-links",
            storageBucket: "neural-links.firebasestorage.app",
            messagingSenderId: "1040211261030",
            appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadLinks() {
            const linksContainer = document.getElementById('links-list');
            const q = query(collection(db, "links"), orderBy("priority", "asc"));
            const querySnapshot = await getDocs(q);
            
            linksContainer.innerHTML = '';
            
            querySnapshot.forEach((doc) => {
                const link = doc.data();
                const a = document.createElement('a');
                a.href = link.url;
                a.className = 'link-card';
                a.innerText = link.title;
                linksContainer.appendChild(a);
            });
        }

        // Carregar Foto do LocalStorage (Depois vamos implementar o Admin)
        const savedPhoto = localStorage.getItem('profile_photo_url');
        if (savedPhoto) {
            document.getElementById('profilePic').src = savedPhoto;
        }

        loadLinks();
    </script>
</body>
</html>
