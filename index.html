<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEURAL LINKS</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

</head>

<body>

<!-- SCANLINE -->

<div class="scanline"></div>

<div class="container">

<div class="hud">

<!-- PROFILE -->

<div class="profile">

<img id="avatar" class="avatar">

<h1 class="glitchTitle">

<span>NEURAL LINKS</span>

</h1>

<p class="status">

SYSTEM ACTIVE

</p>

<div class="radar"></div>

</div>

<!-- LINKS -->

<div id="links" class="links">

<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>

</div>

<footer>

Found Dev DITOH

</footer>

</div>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",

authDomain: "neural-links.firebaseapp.com",

projectId: "neural-links",

storageBucket: "neural-links.firebasestorage.app",

messagingSenderId: "1040211261030",

appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* LOAD PROFILE PHOTO */

firebase.storage()

.ref("profile.png")

.getDownloadURL()

.then(url => {

document

.getElementById("avatar")

.src = url;

})

.catch(() => {

/* fallback */

document

.getElementById("avatar")

.src = "https://via.placeholder.com/110";

});

/* VALIDATE URL */

function validateURL(url) {

if (!url.startsWith("http")) {

return "https://" + url;

}

return url;

}

/* CREATE LINK */

function createLink(title, url) {

const a = document.createElement("a");

a.href = validateURL(url);

a.target = "_blank";

a.className = "link glitch";

a.innerText = title.toUpperCase();

/* CLICK GLITCH EFFECT */

a.addEventListener("mouseenter", () => {

a.classList.add("glitchActive");

setTimeout(() => {

a.classList.remove("glitchActive");

}, 300);

});

linksContainer.appendChild(a);

}

/* LOAD LINKS */

const linksContainer =

document.getElementById("links");

function loadLinks() {

linksContainer.innerHTML = "";

db.collection("links")

.orderBy("priority")

.get()

.then(snapshot => {

snapshot.forEach(doc => {

const data = doc.data();

createLink(

data.title,

data.url

);

});

});

}

loadLinks();

</script>

</body>

</html>
