<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DITOH // NEURAL_LINKS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <header class="main-header">
            <div class="system-id">CORE SYSTEM v2.4.0</div>
            <h1>NEURAL<br>LINKS_</h1>
            <p style="margin-top: 20px; color: #888; font-weight: 400;">Developed by DITOH // Hub Brain Ecosystem</p>
        </header>

        <nav id="neural-container" class="neural-grid">
            </nav>

        <footer class="system-footer">
            <div class="dev-info">
                STATUS: <span style="color: #00ff00">ACTIVE</span><br>
                FOUND_DEV: <b>DITOH</b>
            </div>
            <a href="admin.html" class="core-btn">ACC_CORE</a>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
            authDomain: "neural-links.firebaseapp.com",
            projectId: "neural-links",
            storageBucket: "neural-links.firebasestorage.app",
            messagingSenderId: "1040211261030",
            appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchSystemData() {
            const container = document.getElementById('neural-container');
            const q = query(collection(db, "links"), orderBy("priority", "asc"));
            
            try {
                const querySnapshot = await getDocs(q);
                container.innerHTML = '';

                let i = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const index = i < 10 ? `0${i}` : i;
                    
                    const linkHTML = `
                        <a href="${data.url}" class="link-row" style="transition-delay: ${i * 100}ms">
                            <span class="index">${index}</span>
                            <span class="label">${data.title}</span>
                            <span class="arrow">→</span>
                        </a>
                    `;
                    container.insertAdjacentHTML('beforeend', linkHTML);
                    i++;
                });

                // Gatilho para animação de entrada
                setTimeout(() => {
                    document.querySelectorAll('.link-row').forEach(row => {
                        row.classList.add('visible');
                    });
                }, 100);

            } catch (error) {
                console.error("Erro ao acessar núcleo:", error);
                container.innerHTML = '<p style="color: red;">CRITICAL ERROR: ACCESS_DENIED</p>';
            }
        }

        fetchSystemData();
    </script>
</body>
</html>
