<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL LINKS — DITOH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SCANLINES OVERLAY -->
    <div class="scanlines"></div>

    <!-- GRID BACKGROUND -->
    <div class="grid-bg"></div>

    <!-- NOISE OVERLAY -->
    <canvas id="noise-canvas"></canvas>

    <!-- RADAR PULSE -->
    <div class="radar-container">
        <div class="radar-ring r1"></div>
        <div class="radar-ring r2"></div>
        <div class="radar-ring r3"></div>
        <div class="radar-sweep"></div>
    </div>

    <!-- CORNER DECORATIONS -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <span class="status-item"><span class="blink-dot"></span>SYS ONLINE</span>
        <span class="status-item" id="clock">00:00:00</span>
        <span class="status-item">NEURAL v2.0</span>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">

        <!-- HEADER -->
        <header class="profile-header">
            <div class="profile-avatar-wrap">
                <div class="avatar-hex">
                    <div class="avatar-inner">
                        <svg viewBox="0 0 60 60" class="avatar-icon-svg">
                            <circle cx="30" cy="20" r="10" fill="none" stroke="#bc13fe" stroke-width="1.5"/>
                            <path d="M10 50 Q10 35 30 35 Q50 35 50 50" fill="none" stroke="#bc13fe" stroke-width="1.5"/>
                            <circle cx="30" cy="20" r="4" fill="#bc13fe" opacity="0.6"/>
                        </svg>
                    </div>
                    <div class="avatar-ring-1"></div>
                    <div class="avatar-ring-2"></div>
                    <div class="avatar-pulse"></div>
                </div>
            </div>

            <div class="profile-info">
                <div class="profile-tag">// FOUNDER & DEV</div>
                <h1 class="profile-name">DITOH</h1>
                <div class="profile-sub">
                    <span class="sub-line"></span>
                    <span class="sub-text">NEURAL LINKS OPERATOR</span>
                    <span class="sub-line"></span>
                </div>
            </div>

            <div class="signal-bars">
                <div class="bar b1"></div>
                <div class="bar b2"></div>
                <div class="bar b3"></div>
                <div class="bar b4"></div>
                <div class="bar b5"></div>
            </div>
        </header>

        <!-- SYSTEM READOUT -->
        <div class="readout-strip">
            <span class="readout-label">AXON://NEURAL_LINKS</span>
            <span class="readout-sep">◈</span>
            <span class="readout-label" id="link-count">LOADING...</span>
            <span class="readout-sep">◈</span>
            <span class="readout-label blink-text">ACCESS GRANTED</span>
        </div>

        <!-- LINKS CONTAINER -->
        <div class="links-grid" id="links-container">
            <!-- SKELETON LOADERS -->
            <div class="link-skeleton"></div>
            <div class="link-skeleton" style="animation-delay:0.1s"></div>
            <div class="link-skeleton" style="animation-delay:0.2s"></div>
        </div>

        <!-- FOOTER -->
        <footer class="neural-footer">
            <div class="footer-line"></div>
            <div class="footer-content">
                <span class="footer-code">FOUND & DEV</span>
                <span class="footer-name">DITOH</span>
            </div>
            <div class="footer-hex">◆</div>
        </footer>

    </div>

    <!-- GLITCH OVERLAY -->
    <div class="glitch-overlay" id="glitch-overlay"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
            authDomain: "neural-links.firebaseapp.com",
            projectId: "neural-links",
            storageBucket: "neural-links.firebasestorage.app",
            messagingSenderId: "1040211261030",
            appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CLOCK
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent =
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0') + ':' +
                String(now.getSeconds()).padStart(2,'0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // NOISE CANVAS
        const canvas = document.getElementById('noise-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        function drawNoise() {
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            for (let i = 0; i < imageData.data.length; i += 4) {
                const v = Math.random() * 8;
                imageData.data[i] = v;
                imageData.data[i+1] = v;
                imageData.data[i+2] = v;
                imageData.data[i+3] = 18;
            }
            ctx.putImageData(imageData, 0, 0);
            requestAnimationFrame(drawNoise);
        }
        drawNoise();

        // GLITCH EFFECT
        function triggerGlitch() {
            const el = document.getElementById('glitch-overlay');
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 200);
            setTimeout(triggerGlitch, Math.random() * 8000 + 4000);
        }
        setTimeout(triggerGlitch, 3000);

        // ICONS MAP
        const iconMap = {
            instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>`,
            tiktok: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.79 1.52V6.76a4.85 4.85 0 01-1.02-.07z"/></svg>`,
            github: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.167 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>`,
            youtube: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0C.488 3.45.029 5.804 0 12c.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0C23.512 20.55 23.971 18.196 24 12c-.029-6.185-.484-8.549-4.385-8.816zM9 16V8l8 3.993L9 16z"/></svg>`,
            twitter: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
            link: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`,
            globe: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`
        };

        function getIcon(type) {
            return iconMap[type?.toLowerCase()] || iconMap['link'];
        }

        function getIconType(url) {
            if (!url) return 'link';
            if (url.includes('instagram')) return 'instagram';
            if (url.includes('tiktok')) return 'tiktok';
            if (url.includes('github')) return 'github';
            if (url.includes('youtube')) return 'youtube';
            if (url.includes('twitter') || url.includes('x.com')) return 'twitter';
            return 'globe';
        }

        // LOAD LINKS
        async function loadLinks() {
            const container = document.getElementById('links-container');
            try {
                const q = query(collection(db, 'links'), orderBy('priority', 'asc'));
                const snap = await getDocs(q);

                container.innerHTML = '';

                if (snap.empty) {
                    container.innerHTML = `
                        <div class="no-links">
                            <span class="mono">// NO DATA FOUND IN NEURAL NETWORK</span>
                            <span class="mono dim">AWAITING OPERATOR INPUT...</span>
                        </div>`;
                    document.getElementById('link-count').textContent = '0 NODES ACTIVE';
                    return;
                }

                const links = [];
                snap.forEach(d => links.push({ id: d.id, ...d.data() }));

                document.getElementById('link-count').textContent = `${links.length} NODES ACTIVE`;

                links.forEach((link, i) => {
                    const url = link.url?.startsWith('http') ? link.url : 'https://' + link.url;
                    const type = getIconType(url);
                    const card = document.createElement('a');
                    card.href = url;
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                    card.className = 'link-card';
                    card.style.animationDelay = `${i * 0.08}s`;
                    card.innerHTML = `
                        <div class="card-index mono">${String(i+1).padStart(2,'0')}</div>
                        <div class="card-icon">${getIcon(link.icon || type)}</div>
                        <div class="card-content">
                            <div class="card-title">${(link.title || link.url).toUpperCase()}</div>
                            ${link.desc ? `<div class="card-desc mono">${link.desc}</div>` : ''}
                        </div>
                        <div class="card-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M7 17L17 7M17 7H7M17 7v10"/>
                            </svg>
                        </div>
                        <div class="card-scan"></div>
                        <div class="card-corner tl"></div>
                        <div class="card-corner tr"></div>
                        <div class="card-corner bl"></div>
                        <div class="card-corner br"></div>
                    `;
                    container.appendChild(card);
                });

            } catch(e) {
                console.error(e);
                container.innerHTML = `<div class="no-links"><span class="mono">// CONNECTION FAILED</span></div>`;
            }
        }

        loadLinks();
    </script>
</body>
</html>
