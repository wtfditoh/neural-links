<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DITOH // NEURAL_LINKS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="header-meta">CORE_SYSTEM // ACCESS_GRANTED</div>
            <h1>NEURAL<br>LINKS</h1>
            <p class="header-meta" style="color:#888">DESIGNED BY DITOH // HUB BRAIN OPERATOR</p>
        </header>

        <nav id="links-container" class="links-grid">
            </nav>

        <footer class="footer">
            <div>STATUS: <span style="color:#00ff00">ONLINE</span></div>
            <div>FOUND_DEV: <b>DITOH</b></div>
            <a href="admin.html" style="color:inherit; text-decoration:none;">[ACC_CORE]</a>
        </footer>
    </div>

    <div style="position: fixed; bottom: 40px; right: 20px; writing-mode: vertical-rl; font-family: 'JetBrains Mono'; font-size: 9px; color: #222; letter-spacing: 5px;">
        CONNECTION_ESTABLISHED // 2026
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
            authDomain: "neural-links.firebaseapp.com",
            projectId: "neural-links",
            storageBucket: "neural-links.firebasestorage.app",
            messagingSenderId: "1040211261030",
            appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadLinks() {
            const container = document.getElementById('links-container');
            const q = query(collection(db, "links"), orderBy("priority", "asc"));
            
            try {
                const snap = await getDocs(q);
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <a href="${data.url}" class="link-card" target="_blank">
                            <span class="title">${data.title}</span>
                            <span class="category">REDIRECT_LINK</span>
                        </a>`;
                });
            } catch (e) {
                container.innerHTML = "<p style='color:red'>ERRO_DE_SINCRO</p>";
            }
        }
        loadLinks();
    </script>
</body>
</html>
