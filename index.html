<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEURAL LINKS</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="scanline"></div>

<div class="container">

<div class="hud">

<div class="profile">

<img src="profile.png" class="avatar">

<h1>NEURAL LINKS</h1>

<p class="status">SYSTEM ACTIVE</p>

<div class="radar"></div>

</div>

<div id="links" class="links">

<!-- Skeleton -->
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>

</div>

<footer>

Found Dev DITOH

</footer>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
authDomain: "neural-links.firebaseapp.com",
projectId: "neural-links",
storageBucket: "neural-links.firebasestorage.app",
messagingSenderId: "1040211261030",
appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const linksContainer = document.getElementById("links");

function validateURL(url) {

if (!url.startsWith("http")) {

return "https://" + url;

}

return url;

}

function createLink(title, url) {

const a = document.createElement("a");

a.href = validateURL(url);

a.target = "_blank";

a.className = "link";

a.innerText = title.toUpperCase();

linksContainer.appendChild(a);

}

function loadLinks() {

linksContainer.innerHTML = "";

db.collection("links")
.orderBy("priority")

.get()

.then(snapshot => {

snapshot.forEach(doc => {

const data = doc.data();

createLink(data.title, data.url);

});

});

}

loadLinks();

</script>

</body>
</html>
