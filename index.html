<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DITOH — NEURAL LINKS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Unbounded:wght@300;400;600;700;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --g: #c9a84c;
            --g2: #f0d878;
            --g3: #8a6820;
            --gd: rgba(201,168,76,0.08);
            --gg: rgba(201,168,76,0.25);
            --bg: #060608;
            --s: rgba(255,255,255,0.02);
            --b: rgba(201,168,76,0.12);
            --t: #ede8df;
            --td: #3a3530;
            --mono: 'DM Mono', monospace;
            --ub: 'Unbounded', sans-serif;
            --sy: 'Syne', sans-serif;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--t);
            font-family: var(--sy);
            min-height: 100dvh;
            overflow-x: hidden;
            position: relative;
        }

        /* ─── BG ─── */
        #bg-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        .vignette {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(6,6,8,0.85) 100%);
            pointer-events: none;
        }

        /* ─── CORNERS ─── */
        .corner {
            position: fixed; width: 24px; height: 24px;
            z-index: 20; pointer-events: none;
        }
        .corner::before, .corner::after { content:''; position:absolute; background:var(--g); }
        .corner::before { width:100%; height:1px; opacity:.5; }
        .corner::after { width:1px; height:100%; opacity:.5; }
        .c-tl { top:18px; left:18px; }
        .c-tr { top:18px; right:18px; } .c-tr::before,.c-tr::after { right:0; }
        .c-bl { bottom:18px; left:18px; } .c-bl::before,.c-bl::after { bottom:0; }
        .c-br { bottom:18px; right:18px; } .c-br::before { bottom:0; right:0; } .c-br::after { bottom:0; right:0; }

        /* ─── TOPBAR ─── */
        .topbar {
            position: fixed; top:0; left:0; right:0; height:36px;
            z-index: 100;
            display: flex; align-items:center; justify-content:space-between;
            padding: 0 24px;
            background: rgba(6,6,8,0.92);
            border-bottom: 1px solid rgba(201,168,76,0.07);
            backdrop-filter: blur(16px);
        }
        .topbar-item {
            font-family: var(--mono);
            font-size: 8.5px; letter-spacing: 2.5px; color: var(--td);
            display: flex; align-items:center; gap:6px;
        }
        .topbar-dot {
            width:4px; height:4px; border-radius:50%;
            background: var(--g); box-shadow: 0 0 6px var(--g);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }

        /* ─── WRAP ─── */
        .wrap {
            position: relative; z-index: 10;
            max-width: 500px; margin: 0 auto;
            padding: 54px 22px 80px;
            min-height: 100dvh;
            display: flex; flex-direction:column;
        }

        /* ─── HERO ─── */
        .hero {
            display: flex; flex-direction: column;
            align-items: center;
            padding: 52px 0 44px;
            position: relative;
        }

        /* AVATAR */
        .av-wrap {
            position: relative;
            width: 120px; height: 120px;
            margin-bottom: 28px;
        }

        .av-core {
            position: absolute; inset: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 32%, #1c1810, #060608);
            border: 1px solid var(--g);
            display: flex; align-items:center; justify-content:center;
            z-index: 2;
            box-shadow:
                0 0 0 1px rgba(201,168,76,0.06),
                0 0 30px rgba(201,168,76,0.12),
                inset 0 0 20px rgba(201,168,76,0.05);
        }

        .av-core svg { width:44px; height:44px; }

        .av-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.18);
            animation: spin 14s linear infinite;
        }
        .av-ring::before {
            content:''; position:absolute;
            width:7px; height:7px; border-radius:50%;
            background: var(--g); box-shadow: 0 0 12px var(--g);
            top:-3.5px; left:50%; transform:translateX(-50%);
        }

        .av-ring2 {
            position: absolute; inset: -14px;
            border-radius: 50%;
            border: 1px dashed rgba(201,168,76,0.07);
            animation: spin 22s linear infinite reverse;
        }

        .av-pulse {
            position: absolute; inset: 10px;
            border-radius: 50%;
            border: 1px solid var(--g);
            opacity: 0;
            animation: avPulse 3s ease-out infinite;
        }
        .av-pulse2 {
            position: absolute; inset: 4px;
            border-radius: 50%;
            border: 1px solid var(--g);
            opacity: 0;
            animation: avPulse 3s ease-out infinite .8s;
        }

        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes avPulse {
            0% { transform:scale(1); opacity:.4; }
            100% { transform:scale(1.5); opacity:0; }
        }

        .av-badge {
            position: absolute; bottom:-2px; left:50%; transform:translateX(-50%);
            background: var(--bg);
            border: 1px solid var(--g);
            border-radius: 20px;
            padding: 3px 10px;
            font-family: var(--mono);
            font-size: 7.5px; letter-spacing: 2.5px; color: var(--g);
            white-space: nowrap; z-index: 3;
        }

        /* NAME */
        .hero-eyebrow {
            font-family: var(--mono);
            font-size: 9px; letter-spacing: 5px;
            color: var(--g); opacity: .55;
            margin-bottom: 10px;
        }

        .hero-name {
            font-family: var(--ub);
            font-size: clamp(24px, 12vw, 48px);
            font-weight: 900;
            letter-spacing: 10px;
            line-height: 1;
            color: transparent;
            background: linear-gradient(160deg, var(--g2) 0%, var(--g) 40%, var(--g3) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(201,168,76,0.2));
            margin-bottom: 12px;
        }

        .hero-role {
            font-family: var(--sy);
            font-size: 11px; font-weight: 500;
            letter-spacing: 5px; color: var(--td);
            text-transform: uppercase;
            display: flex; align-items:center; gap:14px;
        }
        .hero-role::before, .hero-role::after {
            content:'';
            width: 28px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--g));
            opacity: .35;
        }
        .hero-role::after { transform:scaleX(-1); }

        /* ─── STRIP ─── */
        .strip {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--gd);
            border: 1px solid var(--b);
            border-radius: 3px;
            margin-bottom: 22px;
        }
        .strip-item {
            font-family: var(--mono);
            font-size: 8.5px; letter-spacing: 2px; color: var(--td);
        }
        .strip-item b { color: var(--g); font-weight: 400; }
        .strip-sep { color: var(--g); opacity: .3; font-size: 10px; }

        /* ─── SECTION LABEL ─── */
        .section-label {
            display: flex; align-items:center; gap:12px;
            margin-bottom: 14px;
        }
        .sl-line { flex:1; height:1px; background: var(--b); }
        .sl-text {
            font-family: var(--mono);
            font-size: 8.5px; letter-spacing: 3px; color: var(--td);
            white-space: nowrap;
        }
        .sl-diamond { width:5px; height:5px; background:var(--g); opacity:.4; transform:rotate(45deg); flex-shrink:0; }

        /* ─── LINK CARDS ─── */
        .links { display: flex; flex-direction: column; gap: 9px; }

        .lc {
            position: relative;
            display: flex; align-items: center; gap: 14px;
            padding: 16px 18px;
            background: var(--s);
            border: 1px solid var(--b);
            border-radius: 4px;
            text-decoration: none;
            color: var(--t);
            overflow: hidden;
            transition: border-color .22s, background .22s, transform .22s, box-shadow .22s;
            animation: cardIn .55s ease backwards;
        }

        @keyframes cardIn {
            from { opacity:0; transform:translateY(18px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* ACCENT LINE */
        .lc::before {
            content:'';
            position: absolute; left:0; top:0; bottom:0; width:2px;
            background: linear-gradient(180deg, transparent, var(--g), transparent);
            opacity: 0;
            transition: opacity .22s;
        }

        /* SWEEP */
        .lc-sweep {
            position: absolute; inset:0;
            background: linear-gradient(105deg, transparent 40%, rgba(201,168,76,0.04) 50%, transparent 60%);
            background-size: 200% 100%;
            background-position: 200% 0;
            transition: background-position .5s ease;
            pointer-events: none;
        }

        .lc:hover {
            border-color: rgba(201,168,76,.35);
            background: rgba(201,168,76,.04);
            transform: translateX(5px);
            box-shadow: -4px 0 20px rgba(201,168,76,.06), 0 8px 30px rgba(0,0,0,.4);
        }
        .lc:hover::before { opacity: 1; }
        .lc:hover .lc-sweep { background-position: -200% 0; }
        .lc:active { transform: translateX(2px) scale(.99); }

        /* NUMBER */
        .lc-num {
            font-family: var(--mono);
            font-size: 10px; color: var(--td);
            min-width: 20px; letter-spacing: 1px;
            line-height: 1;
        }

        /* ICON */
        .lc-icon {
            width: 40px; height: 40px; flex-shrink:0;
            background: var(--gd);
            border: 1px solid rgba(201,168,76,.15);
            border-radius: 6px;
            display: flex; align-items:center; justify-content:center;
            transition: background .22s, border-color .22s, box-shadow .22s;
            position: relative; overflow: hidden;
        }
        .lc-icon::after {
            content:''; position:absolute; inset:0;
            background: linear-gradient(135deg, rgba(255,255,255,.04), transparent);
        }
        .lc-icon svg { width:19px; height:19px; color:var(--g); position:relative; z-index:1; }
        .lc:hover .lc-icon {
            background: rgba(201,168,76,.14);
            border-color: var(--g);
            box-shadow: 0 0 14px rgba(201,168,76,.18);
        }

        /* BODY */
        .lc-body { flex:1; min-width:0; }
        .lc-title {
            font-family: var(--sy);
            font-size: 14px; font-weight: 700;
            letter-spacing: 1.5px; color: white;
            text-transform: uppercase;
            white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
            transition: color .22s;
        }
        .lc:hover .lc-title { color: var(--g2); }
        .lc-desc {
            font-family: var(--mono);
            font-size: 9px; color: var(--td);
            letter-spacing: 1px; margin-top: 3px;
            white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
        }

        /* TAG */
        .lc-tag {
            font-family: var(--mono);
            font-size: 7.5px; letter-spacing: 2px; color: var(--g);
            border: 1px solid rgba(201,168,76,.2);
            padding: 3px 8px; border-radius: 2px;
            white-space: nowrap; flex-shrink:0;
            background: var(--gd);
        }

        /* ARROW */
        .lc-arrow {
            width:16px; height:16px; flex-shrink:0;
            opacity:0; transform:translate(0,0);
            transition: opacity .22s, transform .22s;
        }
        .lc-arrow svg { width:100%; height:100%; color:var(--g); }
        .lc:hover .lc-arrow { opacity:1; transform:translate(3px,-3px); }

        /* SKELETON */
        .sk {
            height: 74px; border-radius:4px;
            border: 1px solid rgba(201,168,76,.06);
            background: linear-gradient(90deg,
                rgba(201,168,76,.02) 25%,
                rgba(201,168,76,.055) 50%,
                rgba(201,168,76,.02) 75%);
            background-size: 200% 100%;
            animation: sk 1.8s infinite;
        }
        @keyframes sk { to { background-position:-200% 0; } }

        /* EMPTY */
        .empty {
            text-align:center; padding:50px 20px;
            font-family: var(--mono); font-size:10px;
            color: var(--td); letter-spacing:2px; line-height:2.2;
        }

        /* ─── FOOTER ─── */
        .footer {
            margin-top: auto; padding-top: 52px;
            display: flex; flex-direction:column; align-items:center; gap:14px;
        }
        .footer-line {
            width:100%; height:1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,.2), transparent);
        }
        .footer-sig {
            display: flex; align-items:center; gap:12px;
        }
        .footer-label { font-family:var(--mono); font-size:9px; letter-spacing:3px; color:var(--td); }
        .footer-gem { color:var(--g); font-size:9px; opacity:.4; }
        .footer-name {
            font-family: var(--ub);
            font-size: 13px; font-weight:700; letter-spacing:5px;
            color: transparent;
            background: linear-gradient(90deg, var(--g), var(--g2));
            -webkit-background-clip: text; background-clip: text;
        }
        .footer-copy { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--td); }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<div class="topbar">
    <div class="topbar-item"><div class="topbar-dot"></div>ONLINE</div>
    <div class="topbar-item" id="clock">--:--:--</div>
    <div class="topbar-item">NEURAL LINKS</div>
</div>

<div class="wrap">

    <!-- HERO -->
    <div class="hero">
        <div class="hero-eyebrow">// CLASSIFIED PROFILE</div>

        <div class="av-wrap">
            <div class="av-pulse"></div>
            <div class="av-pulse2"></div>
            <div class="av-ring2"></div>
            <div class="av-ring"></div>
            <div class="av-core">
                <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">

                            <stop offset="0%" stop-color="#f0d878"/>

                    </defs>
                    <circle cx="30" cy="21" r="10" stroke="url(#ag)" stroke-width="1.2"/>
                    <path d="M11 52 Q11 35 30 35 Q49 35 49 52" stroke="url(#ag)" stroke-width="1.2" stroke-linecap="round"/>
                    <circle cx="30" cy="21" r="4" fill="url(#ag)" opacity=".35"/>
                    <circle cx="30" cy="21" r="1.8" fill="#f0d878"/>
                    <line x1="21" y1="43" x2="39" y2="43" stroke="#c9a84c" stroke-width=".8" opacity=".25"/>
                    <line x1="17" y1="47" x2="43" y2="47" stroke="#c9a84c" stroke-width=".8" opacity=".15"/>
                    <circle cx="30" cy="21" r="14" stroke="url(#ag)" stroke-width=".4" opacity=".2"/>
                </svg>
            </div>
            <div class="av-badge">OPERATOR</div>
        </div>

        <h1 class="hero-name">DITOH</h1>
        <div class="hero-role">Founder &amp; Developer</div>
    </div>

    <!-- STRIP -->
    <div class="strip">
        <div class="strip-item">STATUS <b>ACTIVE</b></div>
        <div class="strip-sep">◈</div>
        <div class="strip-item" id="node-count">NODES <b>—</b></div>
        <div class="strip-sep">◈</div>
        <div class="strip-item">HUB <b>ECOSYSTEM</b></div>
    </div>

    <!-- SECTION -->
    <div class="section-label">
        <div class="sl-line"></div>
        <div class="sl-diamond"></div>
        <div class="sl-text">LINKS & PROJETOS</div>

        <div class="sl-line"></div>

    <!-- LINKS -->
    <div class="links" id="links">

        <div class="sk" style="animation-delay:.15s"></div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-sig">
            <span class="footer-label">FOUND & DEV</span>
            <span class="footer-gem">◆</span>
            <span class="footer-name">DITOH</span>

        <div class="footer-copy" id="year">© 2025</div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
    authDomain: "neural-links.firebaseapp.com",
    projectId: "neural-links",
    storageBucket: "neural-links.firebasestorage.app",
    messagingSenderId: "1040211261030",
    appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// CLOCK
function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
        String(n.getHours()).padStart(2,'0')+':'+
        String(n.getMinutes()).padStart(2,'0')+':'+
        String(n.getSeconds()).padStart(2,'0');
}
setInterval(tick,1000); tick();
document.getElementById('year').textContent = '© '+new Date().getFullYear();

// BG CANVAS — partículas douradas flutuando
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 1.5 + .3;
        this.speedX = (Math.random() - .5) * .25;
        this.speedY = (Math.random() - .5) * .25;
        this.opacity = Math.random() * .35 + .05;
        this.life = 0;
        this.maxLife = Math.random() * 300 + 200;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life++;
        if (this.life > this.maxLife || this.x<0 || this.x>W || this.y<0 || this.y>H) this.reset();
    }
    draw() {
        const t = this.life / this.maxLife;
        const o = this.opacity * Math.sin(t * Math.PI);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(201,168,76,${o})`;
        ctx.fill();
    }
}

for (let i=0; i<60; i++) particles.push(new Particle());

function drawBg() {
    ctx.clearRect(0,0,W,H);
    // grid sutil
    ctx.strokeStyle = 'rgba(201,168,76,0.025)';
    ctx.lineWidth = .5;
    for (let x=0; x<W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0; y<H; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    // particles
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(drawBg);
}
drawBg();

// ICONS
const ic = {
    instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>`,
    tiktok: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.79 1.52V6.76a4.85 4.85 0 01-1.02-.07z"/></svg>`,

function getIcon(url, type) {
    if (type && ic[type]) return ic[type];
    if (!url) return ic.link;
    if (url.includes('instagram')) return ic.instagram;
    if (url.includes('tiktok')) return ic.tiktok;
    if (url.includes('github')) return ic.github;
    if (url.includes('youtube')) return ic.youtube;
    if (url.includes('twitter')||url.includes('x.com')) return ic.twitter;
    if (url.includes('brain')||url.includes('hubbrain')) return ic.brain;
    return ic.globe;
}

async function load() {
    const container = document.getElementById('links');
    try {
        const q = query(collection(db,'links'), orderBy('priority','asc'));
        const snap = await getDocs(q);
        container.innerHTML = '';

        if (snap.empty) {
            container.innerHTML = `<div class="empty">// NENHUM LINK ATIVO<br><br>ACESSE O ADMIN PARA ADICIONAR</div>`;
            document.querySelector('#node-count b').textContent = '0';
            return;
        }

        const links = [];
        snap.forEach(d => links.push({ id:d.id, ...d.data() }));
        document.querySelector('#node-count b').textContent = links.length;

        links.forEach((lk, i) => {
            const url = lk.url?.startsWith('http') ? lk.url : 'https://'+(lk.url||'');
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.className = 'lc';
            a.style.animationDelay = `${i*.08}s`;
            a.innerHTML = `
                <div class="lc-sweep"></div>
                <div class="lc-num">${String(i+1).padStart(2,'0')}</div>
                <div class="lc-icon">${getIcon(url, lk.icon)}</div>
                <div class="lc-body">
                    <div class="lc-title">${lk.title||url}</div>
                    ${lk.desc ? `<div class="lc-desc">${lk.desc}</div>` : ''}
                </div>
                ${lk.tag ? `<div class="lc-tag">${lk.tag.toUpperCase()}</div>` : ''}
                <div class="lc-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></div>
            `;
            container.appendChild(a);
        });

    } catch(e) {
        console.error(e);
        container.innerHTML = `<div class="empty">// ERRO DE CONEXÃO</div>`;
    }
}

load();
</script>
