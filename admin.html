<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN PANEL</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

</head>

<body>

<div class="container">

<div class="hud">

<!-- LOGIN -->

<div id="loginBox">

<h2>MASTER ACCESS</h2>

<input 
id="passwordInput" 
type="password" 
placeholder="Enter Master Key"
>

<button onclick="checkPassword()">
ACCESS
</button>

</div>

<!-- PAINEL -->

<div id="adminPanel" style="display:none;">

<h2>ADMIN PANEL</h2>

<!-- ADD LINK -->

<input id="title" placeholder="Title">

<input id="url" placeholder="URL">

<input 
id="priority" 
type="number" 
placeholder="Priority"
>

<button onclick="addLink()">

ADD LINK

</button>

<hr>

<h3>LINK LIST</h3>

<div id="linkList"></div>

<hr>

<h3>UPLOAD PROFILE PHOTO</h3>

<input type="file" id="photoInput">

<button onclick="uploadPhoto()">

UPLOAD PHOTO

</button>

</div>

</div>

</div>

<script>

/* 🔒 SENHA */

const MASTER_PASSWORD = "DITOH123";

/* Firebase */

const firebaseConfig = {
apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
authDomain: "neural-links.firebaseapp.com",
projectId: "neural-links",
storageBucket: "neural-links.firebasestorage.app",
messagingSenderId: "1040211261030",
appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* LOGIN */

function checkPassword() {

const input =
document.getElementById("passwordInput").value;

if (input === MASTER_PASSWORD) {

document
.getElementById("loginBox")
.style.display="none";

document
.getElementById("adminPanel")
.style.display="block";

loadLinks();

}
else {

alert("ACCESS DENIED");

}

}

/* VALIDAR URL */

function validateURL(url) {

if (!url.startsWith("http")) {

return "https://" + url;

}

return url;

}

/* ADD LINK */

function addLink() {

const title =
document.getElementById("title").value;

const url =
validateURL(
document.getElementById("url").value
);

const priority =
Number(
document.getElementById("priority").value
);

if (!title || !url) {

alert("Fill all fields");

return;

}

db.collection("links").add({

title,
url,
priority

});

}

/* LOAD LINKS */

function loadLinks() {

db.collection("links")
.orderBy("priority")
.onSnapshot(snapshot => {

const list =
document.getElementById("linkList");

list.innerHTML="";

snapshot.forEach(doc => {

const data = doc.data();

const div =
document.createElement("div");

div.className="linkItem";

div.innerHTML = `

${data.title.toUpperCase()}

<button onclick="editLink('${doc.id}')">
✏️
</button>

<button onclick="deleteLink('${doc.id}')">
🗑️
</button>

`;

list.appendChild(div);

});

});

}

/* DELETE */

function deleteLink(id) {

if (confirm("Delete this link?")) {

db.collection("links")
.doc(id)
.delete();

}

}

/* EDIT */

function editLink(id) {

const newTitle =
prompt("New Title:");

const newURL =
prompt("New URL:");

const newPriority =
prompt("New Priority:");

db.collection("links")
.doc(id)
.update({

title:newTitle,
url:validateURL(newURL),
priority:Number(newPriority)

});

}

/* UPLOAD PHOTO */

function uploadPhoto() {

const file =
document.getElementById("photoInput")
.files[0];

if (!file) {

alert("Select a file");

return;

}

const ref =
storage.ref("profile.png");

ref.put(file)
.then(() => {

alert("Photo Uploaded!");

});

}

</script>

</body>
</html>
