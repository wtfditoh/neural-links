<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL LINKS — ADMIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c; --gold2: #e8c96a;
            --gold-dim: rgba(201,168,76,0.1);
            --gold-glow: rgba(201,168,76,0.25);
            --bg: #080808; --surface: rgba(255,255,255,0.025);
            --border: rgba(201,168,76,0.15);
            --text: #e8e4dc; --text-dim: #4a4540;
            --mono: 'DM Mono', monospace;
            --display: 'Bebas Neue', sans-serif;
            --body: 'Syne', sans-serif;
            --error: #c94c4c; --success: #4cc97a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--body); min-height:100vh; }

        .bg-texture { position:fixed; inset:0; opacity:0.025; background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); pointer-events:none; }

        .corner { position:fixed; width:16px; height:16px; z-index:5; pointer-events:none; }
        .corner::before, .corner::after { content:''; position:absolute; background:var(--gold); opacity:0.3; }
        .corner::before { width:100%; height:1px; }
        .corner::after { width:1px; height:100%; }
        .c-tl { top:16px; left:16px; }
        .c-tr { top:16px; right:16px; } .c-tr::before { right:0; } .c-tr::after { right:0; }
        .c-bl { bottom:16px; left:16px; } .c-bl::before { bottom:0; } .c-bl::after { bottom:0; }
        .c-br { bottom:16px; right:16px; } .c-br::before { bottom:0; right:0; } .c-br::after { bottom:0; right:0; }

        .wrap { max-width:480px; margin:0 auto; padding:40px 24px 80px; position:relative; z-index:10; }

        .admin-header { text-align:center; padding:30px 0 30px; border-bottom:1px solid var(--border); margin-bottom:30px; }
        .admin-eye { font-family:var(--mono); font-size:9px; letter-spacing:4px; color:var(--gold); opacity:0.6; margin-bottom:8px; }
        .admin-name { font-family:var(--display); font-size:28px; letter-spacing:6px; color:white; text-shadow:0 0 20px var(--gold-glow); }
        .admin-name span { color:var(--gold); }

        .panel { display:flex; flex-direction:column; gap:14px; }
        #panel-screen { display:none; }

        .field { display:flex; flex-direction:column; gap:6px; }
        .field label { font-family:var(--mono); font-size:9px; letter-spacing:3px; color:var(--text-dim); }
        .field input, .field select, .field textarea {
            background:rgba(0,0,0,0.5); border:1px solid var(--border);
            border-radius:3px; padding:13px 16px;
            color:var(--text); font-family:var(--mono); font-size:13px;
            outline:none; transition:border-color 0.2s, box-shadow 0.2s; width:100%;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color:var(--gold); box-shadow:0 0 0 2px var(--gold-dim);
        }
        .field input::placeholder, .field textarea::placeholder { color:var(--text-dim); }
        .field select option { background:#0d0d0d; }
        .field textarea { resize:vertical; min-height:60px; }

        .row { display:flex; gap:10px; }
        .row .field { flex:1; }

        .btn { padding:14px 20px; border:none; border-radius:3px; font-family:var(--body); font-size:11px; font-weight:700; letter-spacing:3px; cursor:pointer; transition:all 0.2s; width:100%; text-transform:uppercase; }
        .btn-gold { background:linear-gradient(135deg,var(--gold),#a07830); color:#080808; box-shadow:0 4px 16px var(--gold-glow); }
        .btn-gold:hover { box-shadow:0 6px 24px var(--gold-glow); transform:translateY(-1px); }
        .btn-gold:active { transform:scale(0.98); }
        .btn-ghost { background:var(--gold-dim); border:1px solid var(--border); color:var(--gold); }
        .btn-ghost:hover { background:rgba(201,168,76,0.15); }
        .btn-danger { background:rgba(201,76,76,0.1); border:1px solid rgba(201,76,76,0.2); color:var(--error); }

        .status { font-family:var(--mono); font-size:10px; letter-spacing:2px; padding:10px 14px; border-radius:3px; text-align:center; display:none; }
        .status.ok { display:block; background:rgba(76,201,122,0.08); border:1px solid rgba(76,201,122,0.2); color:var(--success); }
        .status.err { display:block; background:rgba(201,76,76,0.08); border:1px solid rgba(201,76,76,0.2); color:var(--error); }

        .divider { display:flex; align-items:center; gap:12px; margin:6px 0; }
        .divider-line { flex:1; height:1px; background:var(--border); }
        .divider-diamond { width:5px; height:5px; background:var(--gold); opacity:0.5; transform:rotate(45deg); }
        .divider-text { font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:2px; }

        .links-list { display:flex; flex-direction:column; gap:8px; }
        .link-item { display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:3px; }
        .link-priority { font-family:var(--mono); font-size:11px; color:var(--gold); min-width:22px; text-align:center; }
        .link-info { flex:1; min-width:0; }
        .link-title { font-size:13px; font-weight:700; letter-spacing:1px; color:white; }
        .link-url { font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
        .link-tag { font-family:var(--mono); font-size:8px; color:var(--gold); border:1px solid var(--border); padding:2px 7px; border-radius:2px; white-space:nowrap; }
        .btn-del { background:none; border:none; color:var(--error); cursor:pointer; padding:6px; opacity:0.4; font-size:16px; transition:opacity 0.2s; }
        .btn-del:hover { opacity:1; }

        .empty { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:2px; text-align:center; padding:24px; }
        .section-label { font-family:var(--mono); font-size:9px; letter-spacing:3px; color:var(--text-dim); margin-bottom:10px; }
    </style>
</head>
<body>
<div class="bg-texture"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<div class="wrap">
    <div class="admin-header">
        <div class="admin-eye">// RESTRICTED ACCESS</div>
        <div class="admin-name">NEURAL <span>ADMIN</span></div>
    </div>

    <!-- AUTH -->
    <div id="auth-screen" class="panel">
        <div class="field">
            <label>CHAVE MESTRA</label>
            <input type="password" id="master-key" placeholder="••••••••••" onkeydown="if(event.key==='Enter')auth()">
        </div>
        <div id="auth-msg" class="status"></div>
        <button class="btn btn-gold" onclick="auth()">AUTENTICAR →</button>
        <button class="btn btn-ghost" onclick="location.href='index.html'" style="margin-top:-4px">← VER PÁGINA</button>
    </div>

    <!-- PAINEL -->
    <div id="panel-screen" class="panel">
        <div class="section-label">// NOVO LINK</div>

        <div class="field">
            <label>TÍTULO</label>
            <input type="text" id="f-title" placeholder="Ex: Hub Brain">
        </div>
        <div class="field">
            <label>URL</label>
            <input type="url" id="f-url" placeholder="https://...">
        </div>
        <div class="row">
            <div class="field">
                <label>ÍCONE</label>
                <select id="f-icon">
                    <option value="">Auto-detectar</option>
                    <option value="instagram">Instagram</option>
                    <option value="tiktok">TikTok</option>
                    <option value="github">GitHub</option>
                    <option value="youtube">YouTube</option>
                    <option value="twitter">Twitter/X</option>
                    <option value="brain">Hub Brain</option>
                    <option value="globe">Website</option>
                    <option value="link">Genérico</option>
                </select>
            </div>
            <div class="field">
                <label>PRIORIDADE</label>
                <input type="number" id="f-priority" value="10" min="1" max="99">
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>DESCRIÇÃO (opcional)</label>
                <input type="text" id="f-desc" placeholder="Subtítulo do link...">
            </div>
            <div class="field">
                <label>TAG (opcional)</label>
                <input type="text" id="f-tag" placeholder="Ex: APP">
            </div>
        </div>

        <div id="add-msg" class="status"></div>
        <button class="btn btn-gold" onclick="addLink()">+ ADICIONAR LINK</button>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-text">LINKS ATIVOS</div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
        </div>

        <div class="links-list" id="links-list">
            <div class="empty">CARREGANDO...</div>
        </div>

        <div style="margin-top:12px;">
            <button class="btn btn-ghost" onclick="location.href='index.html'">← VER PÁGINA</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
        authDomain: "neural-links.firebaseapp.com",
        projectId: "neural-links",
        storageBucket: "neural-links.firebasestorage.app",
        messagingSenderId: "1040211261030",
        appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const MASTER = 'DITOH2025';

    window.auth = function() {
        const key = document.getElementById('master-key').value;
        const msg = document.getElementById('auth-msg');
        if (key === MASTER) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('panel-screen').style.display = 'flex';
            loadLinks();
        } else {
            msg.className = 'status err';
            msg.textContent = '// ACESSO NEGADO — CHAVE INVÁLIDA';
        }
    };

    async function loadLinks() {
        const lista = document.getElementById('links-list');
        try {
            const q = query(collection(db, 'links'), orderBy('priority','asc'));
            const snap = await getDocs(q);
            if (snap.empty) { lista.innerHTML = '<div class="empty">// NENHUM LINK CADASTRADO</div>'; return; }
            lista.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                const item = document.createElement('div');
                item.className = 'link-item';
                item.innerHTML = `
                    <div class="link-priority">${data.priority||'—'}</div>
                    <div class="link-info">
                        <div class="link-title">${data.title||'—'}</div>
                        <div class="link-url">${data.url||'—'}</div>
                    </div>
                    ${data.tag ? `<div class="link-tag">${data.tag.toUpperCase()}</div>` : ''}
                    <button class="btn-del" onclick="delLink('${d.id}')">✕</button>
                `;
                lista.appendChild(item);
            });
        } catch(e) { lista.innerHTML = '<div class="empty">// ERRO AO CARREGAR</div>'; }
    }

    window.addLink = async function() {
        const title = document.getElementById('f-title').value.trim();
        const url = document.getElementById('f-url').value.trim();
        const icon = document.getElementById('f-icon').value;
        const desc = document.getElementById('f-desc').value.trim();
        const tag = document.getElementById('f-tag').value.trim();
        const priority = parseInt(document.getElementById('f-priority').value)||10;
        const msg = document.getElementById('add-msg');

        if (!title || !url) { msg.className='status err'; msg.textContent='// TÍTULO E URL OBRIGATÓRIOS'; return; }
        const finalUrl = url.startsWith('http') ? url : 'https://' + url;

        try {
            await addDoc(collection(db,'links'), { title, url:finalUrl, icon, desc, tag, priority });
            msg.className='status ok'; msg.textContent='// LINK ADICIONADO';
            ['f-title','f-url','f-desc','f-tag'].forEach(id => document.getElementById(id).value='');
            document.getElementById('f-priority').value='10';
            loadLinks();
        } catch(e) { msg.className='status err'; msg.textContent='// ERRO AO ADICIONAR'; }
        setTimeout(()=>msg.className='status',3000);
    };

    window.delLink = async function(id) {
        if (!confirm('Deletar este link?')) return;
        try { await deleteDoc(doc(db,'links',id)); loadLinks(); }
        catch(e) { alert('Erro ao deletar'); }
    };
</script>
</body>
</html>
