<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE_ACC // HUB BRAIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-meta"><a href="index.html" style="color:inherit">< VOLTAR</a></div>
            <h1 style="font-size: 3rem;">CORE_ACC</h1>
        </header>

        <div class="admin-box">
            <input type="text" id="title" placeholder="NOME DO PROJETO">
            <input type="text" id="url" placeholder="URL COMPLETA (COM HTTPS://)">
            <input type="number" id="priority" placeholder="PRIORIDADE (1, 2, 3...)">
            <input type="password" id="pass" placeholder="MASTER_KEY">
            <button id="addBtn" class="btn-inject">INJETAR DADOS</button>
            <p id="status" style="margin-top:15px; font-family:'JetBrains Mono'; font-size:10px; text-align:center;"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByydpIWB7QcNy1LsL1nKLxtiBBh4GKFs8",
            authDomain: "neural-links.firebaseapp.com",
            projectId: "neural-links",
            storageBucket: "neural-links.firebasestorage.app",
            messagingSenderId: "1040211261030",
            appId: "1:1040211261030:web:2e8ea7a03bc21e45319fa7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('addBtn').addEventListener('click', async () => {
            const t = document.getElementById('title').value;
            const u = document.getElementById('url').value;
            const p = document.getElementById('priority').value;
            const k = document.getElementById('pass').value;
            const s = document.getElementById('status');

            if(k !== "DITOH123") { s.innerText = "ACESSO_NEGADO"; return; }

            try {
                s.innerText = "CONECTANDO...";
                await addDoc(collection(db, "links"), {
                    title: t.toUpperCase(),
                    url: u,
                    priority: parseInt(p) || 99
                });
                s.innerText = "SUCESSO_NA_INJEÇÃO";
                location.href = "index.html";
            } catch (e) {
                s.innerText = "ERRO_DE_SISTEMA";
            }
        });
    </script>
</body>
            </html>
